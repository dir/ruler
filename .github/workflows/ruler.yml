name: Ruler Apply

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  apply-ruler:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'Ruler:') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm run build

      - name: Run ruler apply
        run: node dist/cli/index.js apply --no-gitignore --no-backup --agents=agentsmd,copilot

      - name: Format generated files
        run: pnpm run format

      - name: Create PR for generated changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            # Configure committer identity (author is set explicitly via --author)
            git config user.name "Ruler"
            git config user.email "ruler+workflow@okigu.com"
            branch="ruler/ai-agent-rules"
            git checkout -B "$branch"
            git add .
            git commit -m "Ruler: updating AI agent rules" --author="Ruler <ruler+workflow@okigu.com>" || echo "No changes to commit"
            git push --force-with-lease --set-upstream origin "$branch"

            pr_number=$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number')
            if [ -z "$pr_number" ]; then
              printf '%s\n\n%s\n' \
                "Automated update from the Ruler Apply workflow." \
                "This PR contains generated changes to repository AI agent instruction files." \
                > /tmp/ruler-pr-body.md
              gh pr create \
                --base main \
                --head "$branch" \
                --title "Ruler: update AI agent rules" \
                --body-file /tmp/ruler-pr-body.md
            else
              echo "Updated existing PR #$pr_number"
            fi

            gh workflow run CI --ref "$branch"
          else
            echo "No changes"
          fi
