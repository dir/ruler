name: Ruler Apply

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: read

jobs:
  apply-ruler:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'Ruler:') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm run build

      - name: Run ruler apply
        run: node dist/cli/index.js apply --no-gitignore --no-backup --agents=agentsmd,copilot

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            # Configure committer identity (author is set explicitly via --author)
            git config user.name "Ruler"
            git config user.email "ruler+workflow@okigu.com"
            git add .
            git commit -m "Ruler: updating AI agent rules" --author="Ruler <ruler+workflow@okigu.com>" || echo "No changes to commit"
            git push
          else
            echo "No changes"
          fi
